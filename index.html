<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4ecda" />
    <!-- Identidad tipográfica propia (distinta de Rumbo, que usa solo Inter): Fraunces
         para titulares/marca (serif cálida, con carácter, evoca cuaderno/manuscrito) +
         Work Sans para el resto de la interfaz (humanista, legible, más cálida que
         Inter). <link> estándar de Google Fonts, sin dependencias de build. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- "Añadir a pantalla de inicio" en iOS no lee <link rel="manifest">: sin estas
         etiquetas, Safari abre la app como una pestaña más (con la barra de Safari),
         no a pantalla completa como una app instalada. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nous" />
    <title>Nous</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
